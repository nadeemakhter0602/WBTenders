name: tender_app
description: WB Tenders status lookup app
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.3
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  html: ^0.15.4
  google_mlkit_text_recognition: ^0.13.0
  path_provider: ^2.1.3
  flutter_sms_inbox: ^1.0.3
  permission_handler: ^11.3.0
  url_launcher: ^6.3.0
  image: ^4.2.0
  excel: ^4.0.0
  http: ^1.2.2
  open_file: ^3.3.2
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
